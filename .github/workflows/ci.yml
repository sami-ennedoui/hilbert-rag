name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CPU torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package and dev deps
        run: pip install -e ".[dev]"

      - name: Run hermetic tests
        # The embedding test needs a model download and is marked "network"; skip it in CI.
        run: pytest -m "not network"
